<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>카테고리 등록</title>
  <style>
    body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; color: #333; }
    h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; }
    input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .error { color: #e74c3c; font-size: 0.9em; margin-top: 4px; }
    .btn { padding: 10px 20px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .btn:hover { background: #357abd; }
    .btn-back { display: inline-block; margin-left: 10px; color: #666; text-decoration: none; }
  </style>
</head>
<body>

<h1>카테고리 등록</h1>

<form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
  <div class="form-group">
    <label for="name">카테고리 이름</label>
    <input type="text" th:field="*{name}" placeholder="카테고리 이름 입력"/>
    <div class="error" th:errors="*{name}">오류 메시지</div>
  </div>
  <button type="submit" class="btn">등록</button>
  <a class="btn-back" th:href="@{/categories}">← 목록으로</a>
</form>

<div th:replace="~{fragments/footer :: studentInfo}"></div>
</body>
</html>
